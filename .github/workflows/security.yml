name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC even without new commits
    - cron: "0 8 * * 1"

# Opt into Node.js 24 for GitHub Actions runners (actions/checkout, actions/setup-node).
# Node.js 20-based actions are deprecated and will be forced to Node.js 24 from June 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Restrict default GITHUB_TOKEN permissions to read-only (OpenSSF Scorecard: Token-Permissions)
# Individual jobs that need write access must declare it explicitly.
permissions:
  contents: read

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (fail on high/critical)
        # --audit-level=high: only fail on high or critical CVEs
        # moderate/low issues are reported but don't block the build
        run: npm audit --audit-level=high

  sast:
    name: Static Analysis (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint security scan
        run: npx eslint src/ --max-warnings=0

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [audit, sast]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
