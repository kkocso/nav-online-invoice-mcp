version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 5
    # Group non-security updates to reduce PR noise;
    # security updates always get individual PRs immediately
    groups:
      dev-dependencies:
        dependency-type: "development"
    labels:
      - "dependencies"
      - "security"
